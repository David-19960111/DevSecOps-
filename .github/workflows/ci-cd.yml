name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  issues: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/inventario-api

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests
  # ─────────────────────────────────────────
  test:
    name: ✅ Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventario-api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con coverage
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  # ─────────────────────────────────────────
  # JOB 2: SAST con Bandit
  # ─────────────────────────────────────────
  sast:
    name: 🔍 SAST - Bandit
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: inventario-api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Bandit
        run: pip install bandit[toml]

      - name: Correr análisis SAST
        run: |
          bandit -r . \
            --exclude ./tests \
            -f html \
            -o bandit-report.html \
            --severity-level medium || true

      - name: Subir reporte SAST
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: inventario-api/bandit-report.html

  # ─────────────────────────────────────────
  # JOB 3: SCA
  # ─────────────────────────────────────────

  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: sast

    defaults:
      run:
        working-directory: inventario-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --format=columns || true

  # ─────────────────────────────────────────
  # JOB 4: Build y Push Docker
  # ─────────────────────────────────────────
  docker:
    name: 🐳 Build y Push Docker
    runs-on: ubuntu-latest
    needs: [test, sast]
    if: github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./inventario-api
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 5: Trivy - Scan de imagen Docker
  # ─────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy - Scan Docker
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Escanear imagen con Trivy - 1
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: "sarif"
          exit-code: "0"           
          severity: "CRITICAL,HIGH"
          output: 'trivy-results.sarif'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Subir reporte SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Escanear imagen con Trivy - Table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          output: trivy-report.txt

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      

  # ─────────────────────────────────────────
  # JOB 6: DAST con OWASP ZAP
  # ─────────────────────────────────────────
  dast:
    name: 🕷️ DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Levantar la app con Docker
        run: |
          docker run -d \
            --name inventario-api \
            -p 8000:8000 \
            ${{ env.DOCKER_IMAGE }}:latest
          sleep 5  # Esperar que arranque

      - name: Verificar que la app responde
        run: curl -f http://localhost:8000/ || exit 1

      - name: Correr OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          rules_file_name: "inventario-api/.zap/rules.tsv"
          cmd_options: "-a"         
          fail_action: false   
          allow_issue_writing: false     

      - name: Subir reporte ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Detener contenedor
        if: always()
        run: docker stop inventario-api && docker rm inventario-api



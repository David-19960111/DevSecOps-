name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
    contents: read
    issues: write
    pull-requests: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/inventario-api

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests
  # ─────────────────────────────────────────
  test:
    name: ✅ Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventario-api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con coverage
        run: pytest tests/ -v --cov=. --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/inventario-api

  # ─────────────────────────────────────────
  # JOB 2: SAST con Bandit
  # ─────────────────────────────────────────
  sast:
    name: 🔍 SAST - Bandit
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: inventario-api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Bandit
        run: pip install bandit[toml]

      - name: Correr análisis SAST
        run: |
          bandit -r . \
            --exclude ./tests \
            -f json \
            -o bandit-report.json \
            --severity-level medium || true

      - name: Mostrar reporte
        run: bandit -r . --exclude ./tests --severity-level medium || true

      - name: Subir reporte SAST
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: inventario-api/bandit-report.json

 # ─────────────────────────────────────────
  # JOB 3: SCA
  # ──────

  sca:
    name: 📦 SCA - pip-audit
    runs-on: ubuntu-latest
    needs: sast
    permissions:
      security-events: write  # 👈 para subir SARIF
    defaults:
      run:
        working-directory: inventario-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Correr SCA
        run: |
          pip-audit \
            -r requirements.txt \
            -f sarif \
            -o pip-audit-report.sarif || true

      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: inventario-api/pip-audit-report.sarif
          category: pip-audit-sca

  # ─────────────────────────────────────────
  # JOB 4: Build y Push Docker
  # ─────────────────────────────────────────
  docker:
    name: 🐳 Build y Push Docker
    runs-on: ubuntu-latest
    needs: [test, sast, sca]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./inventario-api
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 5: Trivy - Scan de imagen Docker
  # ─────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy - Scan Docker
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: "sarif"
          exit-code: "0"           # Cambiá a "1" para que falle si hay CVEs críticos
          severity: "CRITICAL,HIGH"

      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif
          category: trivy-docker

  # ─────────────────────────────────────────
  # JOB 6: DAST con OWASP ZAP
  # ─────────────────────────────────────────
  dast:
    name: 🕷️ DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Levantar la app con Docker
        run: |
          docker run -d \
            --name inventario-api \
            -p 8000:8000 \
            ${{ env.DOCKER_IMAGE }}:latest
          sleep 10  # Esperar que arranque

      - name: Verificar que la app responde
        run: curl -f http://localhost:8000/ || exit 1

      - name: Correr OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          rules_file_name: "inventario-api/.zap/rules.tsv"
          cmd_options: "-a"         
          fail_action: false  
          artifact_name: zap-results 

      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif    # 👈 ZAP lo genera automáticamente con este nombre
          category: zap-dast

      - name: Detener contenedor
        if: always()
        run: docker stop inventario-api && docker rm inventario-api
